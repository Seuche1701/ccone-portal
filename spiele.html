<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spiele Verwaltung</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 2rem;
        }

        .header {
            max-width: 1400px;
            margin: 0 auto 3rem auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.5rem 2rem;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 2px solid rgba(255,255,255,0.2);
        }

        .header h1 {
            font-size: 2.5rem;
            color: white;
            font-weight: 900;
        }

        .back-btn {
            padding: 0.8rem 1.5rem;
            font-size: 1rem;
            color: white;
            background: rgba(255,255,255,0.1);
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 10px;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s ease;
            font-weight: 700;
        }

        .back-btn:hover {
            background: rgba(255,255,255,0.2);
            transform: translateY(-2px);
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .platform-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 2rem;
            margin-top: 2rem;
        }

        .platform-card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border: 3px solid rgba(255,255,255,0.2);
            border-radius: 20px;
            padding: 2rem;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .platform-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0) 100%);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .platform-card:hover {
            transform: translateY(-10px) scale(1.02);
            border-color: rgba(255,255,255,0.5);
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }

        .platform-card:hover::before {
            opacity: 1;
        }

        /* PlayStation Colors */
        .ps1 { border-color: rgba(0, 67, 156, 0.6); background: linear-gradient(135deg, rgba(0, 67, 156, 0.2) 0%, rgba(0, 67, 156, 0.05) 100%); }
        .ps2 { border-color: rgba(0, 67, 156, 0.6); background: linear-gradient(135deg, rgba(0, 67, 156, 0.2) 0%, rgba(0, 67, 156, 0.05) 100%); }
        .ps3 { border-color: rgba(0, 67, 156, 0.6); background: linear-gradient(135deg, rgba(0, 67, 156, 0.2) 0%, rgba(0, 67, 156, 0.05) 100%); }
        .ps4 { border-color: rgba(0, 112, 209, 0.6); background: linear-gradient(135deg, rgba(0, 112, 209, 0.2) 0%, rgba(0, 112, 209, 0.05) 100%); }
        .ps5 { border-color: rgba(0, 112, 209, 0.6); background: linear-gradient(135deg, rgba(0, 112, 209, 0.2) 0%, rgba(0, 112, 209, 0.05) 100%); }
        
        /* PC Color */
        .pc { border-color: rgba(255, 165, 0, 0.6); background: linear-gradient(135deg, rgba(255, 165, 0, 0.2) 0%, rgba(255, 165, 0, 0.05) 100%); }
        
        /* Xbox Color */
        .xbox { border-color: rgba(16, 124, 16, 0.6); background: linear-gradient(135deg, rgba(16, 124, 16, 0.2) 0%, rgba(16, 124, 16, 0.05) 100%); }
        
        /* Nintendo Color */
        .nintendo { border-color: rgba(230, 0, 18, 0.6); background: linear-gradient(135deg, rgba(230, 0, 18, 0.2) 0%, rgba(230, 0, 18, 0.05) 100%); }

        .platform-logo {
            margin-bottom: 1.5rem;
            filter: drop-shadow(0 5px 15px rgba(0,0,0,0.3));
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100px;
        }

        .platform-logo svg {
            max-width: 100%;
            height: auto;
        }

        .platform-name {
            font-size: 1.8rem;
            font-weight: 900;
            color: white;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .platform-info {
            font-size: 0.9rem;
            color: rgba(255,255,255,0.7);
            font-weight: 600;
        }

        .platform-card:hover .platform-logo {
            transform: scale(1.1);
            transition: transform 0.3s ease;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        .platform-logo {
            animation: float 3s ease-in-out infinite;
        }

        .platform-card:nth-child(1) .platform-logo { animation-delay: 0s; }
        .platform-card:nth-child(2) .platform-logo { animation-delay: 0.2s; }
        .platform-card:nth-child(3) .platform-logo { animation-delay: 0.4s; }
        .platform-card:nth-child(4) .platform-logo { animation-delay: 0.6s; }
        .platform-card:nth-child(5) .platform-logo { animation-delay: 0.8s; }
        .platform-card:nth-child(6) .platform-logo { animation-delay: 1s; }
        .platform-card:nth-child(7) .platform-logo { animation-delay: 1.2s; }
        .platform-card:nth-child(8) .platform-logo { animation-delay: 1.4s; }
    </style>
</head>

    <script>
        function selectPlatform(platform) {
            console.log(`Platform selected: ${platform}`);
            alert(`${platform} Spieleverwaltung wird geladen...`);
            // TODO: Navigate to platform-specific page or open modal
        }

        // Add keyboard navigation
        document.addEventListener('keydown', function(e) {
            const cards = document.querySelectorAll('.platform-card');
            const focusedIndex = Array.from(cards).findIndex(card => card === document.activeElement);
            
            if (e.key === 'ArrowRight' && focusedIndex < cards.length - 1) {
                cards[focusedIndex + 1].focus();
            } else if (e.key === 'ArrowLeft' && focusedIndex > 0) {
                cards[focusedIndex - 1].focus();
            } else if (e.key === 'Enter' && focusedIndex >= 0) {
                cards[focusedIndex].click();
            }
        });

        // Make cards focusable
        document.querySelectorAll('.platform-card').forEach(card => {
            card.setAttribute('tabindex', '0');
        });
    </script>
